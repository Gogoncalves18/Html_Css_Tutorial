<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu Carro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h3>Casdastre seu veículo para vender!</h3>
        </div>
        <div class="form-container">
            <div class="form-header">
                <p>Formulário</p>
            </div>
            <form>
                <div class="form-body">
                    <h1 class="form-title">Venda fácil seu carro!</h1>
                    <p>Descreva as características e marque os opcionais</p>
                    <div class="box-input">
                        <label for="title">Título do anúncio <span class="required-field">*</span></label>
                        <input type="text" name="title" id="title" class="block" placeholder="Um título para anunciar"
                            minlength="5" maxlength="30" required>
                    </div>

                    <div class="box-input">
                        <label for="price">Preço <span class="required-field">*</span></label>
                        <input type="text" name="price" id="price" class="block" placeholder="Defina o preço" required>
                    </div>

                    <div class="box-input">
                        <label for="description">Descrição <span class="required-field">*</span></label>
                        <textarea name="description" id="description" class="block"
                            placeholder="Faça a descrição de seu veículo"></textarea>
                    </div>

                    <div class="box-input">
                        <label for="brand">Marca <span class="required-field">*</span></label>
                        <input type="brand" name="brand" id="brand" class="block" placeholder="Nome da marca" required>
                    </div>

                    <div class="box-input">
                        <label for="model">Modelo <span class="required-field">*</span></label>
                        <input type="model" name="model" id="model" class="block" placeholder="Nome do modelo apenas"
                            required>
                    </div>

                    <div class="box-input">
                        <label for="mileage">Kilometragem <span class="required-field">*</span></label>
                        <input type="number" name="mileage" id="mileage" class="block" placeholder="KM - apenas número"
                            required>
                    </div>

                    <div class="box-input">
                        <label for="purchase-date">Data de Compra <span class="required-field">*</span></label>
                        <input type="date" name="purchase-date" id="purchase-date" class="block" required>
                    </div>

                    <div class="box-input">
                        <p>Tipo de câmbio: <span class="required-field">*</span></p>
                        <input type="radio" id="manual" name="gear">
                        <label for="manual">Manual</label>
                        <input type="radio" id="automatic" name="gear">
                        <label for="automatic">Automático</label>
                    </div>

                    <div class="optional-box">
                        <p>Opcionais: </p>
                        <ul class="optional-list">
                            <li>
                                <input type="checkbox" name="optional[]" id="airbag" value="airbag">
                                <label for="airbag">Airbag </label>
                            </li>
                            <li>
                                <input type="checkbox" name="optional[]" id="alarme" value="alarme">
                                <label for="alarme">Alarme </label>
                            </li>
                            <li>
                                <input type="checkbox" name="optional[]" id="ac" value="ac">
                                <label for="ac">Ar Condicionado </label>
                            </li>
                        </ul>
                    </div>

                    <div class="optional-box">

                        <ul class="optional-list">
                            <li>
                                <input type="checkbox" name="optional[]" id="lane_assist" value="lane_assist">
                                <label for="lane_assist">Assistente de pista </label>
                            </li>
                            <li>
                                <input type="checkbox" name="optional[]" id="key_less" value="key_less">
                                <label for="key_less">Key Less </label>
                            </li>
                            <li>
                                <input type="checkbox" name="optional[]" id="smartphone" value="smartphone">
                                <label for="smartphone">Integração com smartphone </label>
                            </li>
                            <li>
                                <input type="checkbox" name="optional[]" id="lead_seat" value="lead_seat">
                                <label for="lead_seat">Banco de couro </label>
                            </li>
                        </ul>
                    </div>

                    <div class="box-input">
                        <p>Fotos do carro: <span class="required-field">*</span></p>
                        <input type="file" multiple accept="image/png, image/jpg" id="images" name="images" required>
                    </div>

                    <input type="submit" value="Enviar" class="btn-summit">
                </div>


        </div>

        </form>
    </div>
    </div>
</body>

</html>
